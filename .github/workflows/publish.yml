name: Publish to HomeConsole Marketplace

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish plugin
        env:
          MARKETPLACE_URL: ${{ secrets.MARKETPLACE_API_URL }}
          TOKEN: ${{ secrets.MARKETPLACE_PUBLISHER_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          PLUGIN_NAME=$(python3 -c "import json; print(json.load(open('plugin.json'))['name'])")
          DESCRIPTION=$(python3 -c "import json; print(json.load(open('plugin.json')).get('description','')[:256])")
          echo "Plugin: $PLUGIN_NAME  ref: $SHA"

          # Создать плагин если не существует
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "$MARKETPLACE_URL/api/plugins/$PLUGIN_NAME")

          if [ "$STATUS" = "404" ]; then
            echo "Creating plugin..."
            BODY=$(curl -s -w "\nHTTP_%{http_code}" -X POST "$MARKETPLACE_URL/api/admin/plugins" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$PLUGIN_NAME\",\"display_name\":\"$PLUGIN_NAME\",\"description\":\"$DESCRIPTION\",\"homepage_url\":\"https://github.com/$REPO\"}")
            HTTP_STATUS=$(echo "$BODY" | grep "HTTP_" | tail -1 | cut -d_ -f2)
            RESPONSE=$(echo "$BODY" | grep -v "HTTP_")
            echo "create → $HTTP_STATUS: $RESPONSE"
            if [ "$HTTP_STATUS" != "201" ]; then exit 1; fi
          fi

          # Опубликовать релиз из текущего коммита
          echo "Publishing release..."
          BODY=$(curl -s -w "\nHTTP_%{http_code}" -X POST "$MARKETPLACE_URL/api/plugins/$PLUGIN_NAME/releases/from-git" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"$SHA\",\"channel\":\"stable\",\"force_replace\":true,\"source_repo\":\"https://github.com/$REPO\"}")
          HTTP_STATUS=$(echo "$BODY" | grep "HTTP_" | tail -1 | cut -d_ -f2)
          RESPONSE=$(echo "$BODY" | grep -v "HTTP_")
          echo "from-git → $HTTP_STATUS: $RESPONSE"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then exit 1; fi
          echo "✓ done"
